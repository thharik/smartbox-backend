<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ao Vivo - Tvxbox</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="pwa/manifest.json">
  <meta name="theme-color" content="#141414">
  <link rel="apple-touch-icon" href="pwa/icon-192.png">
</head>
<body>
      // santifico em nome de Jesus
  <header class="topbar">
    <a href="index.html" class="logo">TVXBOX</a>
    <button class="menu-toggle" id="menuToggle" aria-label="Menu" aria-expanded="false">☰</button>
    <nav class="main-nav" id="mainNav">
      <a href="index.html">Início</a>
      <a href="ao-vivo.html">Ao Vivo</a>
      <a href="mangas.html">Mangás</a>
      <a href="aulas.html">Aulas</a>
    </nav>
    <div class="header-right">
      <div class="user-box">
        <span id="usuarioNome"></span>
        <button id="btnSair" type="button">Sair</button>
      </div>
    </div>
  </header>

  <main class="container">
    <h1 class="section-title" style="margin-bottom:24px">Canais ao vivo</h1>
    <div id="canaisGrid" class="poster-row"></div>
  </main>

  <script src="pwa/register-sw.js"></script>
  <script>
    const BACKEND = "https://tvxbox-backend-1.onrender.com";

    // ── Proteção: redireciona se não logado ──────────────────────────────────
    const token = localStorage.getItem("sb_token")?.replace(/"/g, "");
    if (!token) { window.location.href = "login.html"; }

    // ── Nome do usuário no header ────────────────────────────────────────────
    const emailSalvo = localStorage.getItem("sb_email")?.replace(/"/g, "");
    if (emailSalvo) {
      document.getElementById("usuarioNome").textContent = emailSalvo.split("@")[0];
    }

    // ── Botão sair ───────────────────────────────────────────────────────────
    document.getElementById("btnSair").addEventListener("click", () => {
      localStorage.removeItem("sb_token");
      localStorage.removeItem("sb_email");
      window.location.href = "login.html";
    });

    // ── Menu mobile ──────────────────────────────────────────────────────────
    document.getElementById("menuToggle").addEventListener("click", function () {
      const nav = document.getElementById("mainNav");
      const aberto = nav.classList.toggle("nav-aberto");
      this.setAttribute("aria-expanded", aberto);
    });

    // ── Verificar assinatura antes de mostrar canais ─────────────────────────
    async function verificarAssinatura() {
      try {
        const r = await fetch(BACKEND + "/assinatura/status", {
          headers: { "Authorization": "Bearer " + token }
        });
        const data = await r.json();
        return data.ativa === true;
      } catch {
        return false;
      }
    }

    // ── Renderizar canais ────────────────────────────────────────────────────
    async function carregarCanais() {
      const grid = document.getElementById("canaisGrid");

      // Busca lista de canais
      try {
        const r = await fetch(BACKEND + "/canais", {
          headers: { "Authorization": "Bearer " + token }
        });

        if (!r.ok) throw new Error("Erro ao buscar canais");
        const canais = await r.json();

        if (!canais.length) {
          grid.innerHTML = `<p style="color:#aaa">Nenhum canal disponível no momento.</p>`;
          return;
        }

        grid.innerHTML = "";
        canais.forEach(canal => {
          const card = document.createElement("div");
          card.className = "poster-card";
          card.style.cursor = "pointer";
          card.innerHTML = `
            <img src="${canal.poster || ''}" alt="${canal.titulo}" loading="lazy"
                 onerror="this.src='assets/placeholder.png'">
            <div class="info">
              <h3>${canal.titulo}</h3>
              <p style="color:#e50914;font-size:12px;font-weight:bold;">● AO VIVO</p>
            </div>`;
          card.addEventListener("click", () => {
            // Salva o canal selecionado e abre o player
            localStorage.setItem("canalAtual", JSON.stringify(canal));
            window.location.href = `assistir.html?canal=${encodeURIComponent(canal.id)}`;
          });
          grid.appendChild(card);
        });

      } catch (err) {
        console.error(err);
        grid.innerHTML = `<p style="color:#e50914">Erro ao carregar canais. Tente novamente.</p>`;
      }
    }

    // ── Redireciona para checkout do Stripe ──────────────────────────────────
    async function assinar() {
      try {
        const r = await fetch(BACKEND + "/assinatura/checkout", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          }
        });
        const data = await r.json();
        if (data.ja_ativo) { location.reload(); return; }
        if (data.url) window.location.href = data.url;
      } catch {
        alert("Erro ao abrir página de pagamento. Tente novamente.");
      }
    }

    carregarCanais();
  </script>
</body>
</html>
