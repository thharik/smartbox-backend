<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ao Vivo - Tvxbox</title>
  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="pwa/manifest.json">
  <meta name="theme-color" content="#141414">
  <link rel="apple-touch-icon" href="pwa/icon-192.png">
</head>
<body>
  <header class="topbar">
    <a href="index.html" class="logo">TVXBOX</a>
    <button class="menu-toggle" id="menuToggle" aria-label="Menu" aria-expanded="false">☰</button>
    <nav class="main-nav" id="mainNav">
      <a href="index.html">Início</a>
      <a href="ao-vivo.html">Ao Vivo</a>
      <a href="mangas.html">Mangás</a>
      <a href="aulas.html">Aulas</a>
    </nav>
    <div class="header-right">
      <div class="user-box">
        <span id="usuarioNome"></span>
        <button id="btnSair" type="button">Sair</button>
      </div>
    </div>
  </header>

  <main class="container">
    <h1 class="section-title" style="margin-bottom:24px">Canais ao vivo</h1>
    <div id="canaisGrid" class="poster-row"></div>
  </main>

  <script src="pwa/register-sw.js"></script>
  <script>
    const BACKEND = "https://tvxbox-backend-1.onrender.com";

    function getToken() {
      try { return JSON.parse(localStorage.getItem("sb_token")); } catch { return null; }
    }

    const token = getToken();
    if (!token) { window.location.href = "login.html"; }

    try {
      const perfil = JSON.parse(localStorage.getItem("sb_perfil_nome"));
      const email  = localStorage.getItem("usuarioEmail");
      document.getElementById("usuarioNome").textContent = perfil || email || "";
    } catch {}

    document.getElementById("btnSair").addEventListener("click", () => {
      localStorage.removeItem("sb_token");
      localStorage.removeItem("sb_perfil_id");
      localStorage.removeItem("sb_perfil_nome");
      localStorage.removeItem("usuarioEmail");
      window.location.href = "login.html";
    });

    document.getElementById("menuToggle").addEventListener("click", function () {
      const nav = document.getElementById("mainNav");
      const aberto = nav.classList.toggle("nav-aberto");
      this.setAttribute("aria-expanded", aberto);
    });

    async function carregarCanais() {
      const grid = document.getElementById("canaisGrid");
      grid.innerHTML = "<p style='color:#aaa;padding:20px'>Carregando canais...</p>";
      try {
        const r = await fetch(BACKEND + "/canais", {
          headers: { "Authorization": "Bearer " + token }
        });
        if (!r.ok) throw new Error("Status " + r.status);
        const canais = await r.json();
        if (!canais.length) {
          grid.innerHTML = "<p style='color:#aaa'>Nenhum canal disponível.</p>";
          return;
        }
        grid.innerHTML = "";
        canais.forEach(canal => {
          const card = document.createElement("div");
          card.className = "poster-card";
          card.innerHTML =
            '<img src="' + (canal.poster || '') + '" alt="' + canal.titulo + '" loading="lazy" onerror="this.src=\'assets/posters/placeholder.jpg\'">' +
            '<div class="info"><h3>' + canal.titulo + '</h3><p style="color:#e50914;font-size:12px;font-weight:bold;">&#9679; AO VIVO</p></div>';
          card.addEventListener("click", function() {
            window.location.href = "assistir.html?canal=" + encodeURIComponent(canal.id);
          });
          grid.appendChild(card);
        });
      } catch (err) {
        console.error("Erro ao carregar canais:", err);
        grid.innerHTML = "<p style='color:#e50914'>Erro ao carregar canais. Tente novamente.</p>";
      }
    }

    carregarCanais();
  </script>
</body>
</html>
